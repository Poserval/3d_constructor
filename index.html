<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>3D Constructor — Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c1f 0%, #1a1a3e 50%, #2d1b4e 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .glass-panel {
            max-width: 650px;
            width: 100%;
            background: rgba(15, 20, 35, 0.5);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
            transition: all 0.2s;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 1rem;
        }

        .logo {
            max-width: 140px;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #ffffff, #c1b5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .tagline {
            text-align: center;
            color: #cdc6ff;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            display: inline-block;
            width: auto;
            padding-bottom: 6px;
        }

        .tools-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin: 2rem 0;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 0.2rem;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tool-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: rgba(160, 126, 255, 0.5);
        }

        .tool-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            padding: 1rem 1.2rem;
            border-radius: 1.5rem;
            width: 100%;
        }

        .tool-icon {
            font-size: 2rem;
            min-width: 48px;
            text-align: center;
        }

        .tool-info {
            flex: 1;
        }

        .tool-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.2px;
        }

        .tool-desc {
            font-size: 0.75rem;
            color: #b9b3e6;
            margin-top: 4px;
        }

        .tool-badge {
            background: #3a2c6e;
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #cdc0ff;
            white-space: nowrap;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #6a6388;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1.2rem;
        }

        @media (max-width: 480px) {
            .glass-panel { padding: 1.5rem; }
            .tool-name { font-size: 1.1rem; }
            .tool-icon { font-size: 1.6rem; min-width: 40px; }
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="logo-area">
        <!-- если в корне репозитория есть папка assets с лого, используйте её -->
        <img src="assets/logo_constructor.png" alt="3D Constructor" class="logo" onerror="this.style.display='none'">
        <h1>🏗️ 3D Constructor</h1>
        <div style="text-align: center;">
            <span class="tagline">Создавай · Конвертируй · Вдохновляйся</span>
        </div>
    </div>

    <div class="tools-grid">
        <!-- КОНВЕРТЕР — уже готов -->
        <div class="tool-card">
            <a href="converter/" class="tool-link">
                <div class="tool-icon">🔄</div>
                <div class="tool-info">
                    <div class="tool-name">Конвертер 3D</div>
                    <div class="tool-desc">STL → OBJ / GLB / GLTF</div>
                </div>
                <div class="tool-badge">доступно</div>
            </a>
        </div>

        <!-- ГЕНЕРАТОР (заглушка) -->
        <div class="tool-card">
            <a href="#" class="tool-link" onclick="showSoonToast(event)">
                <div class="tool-icon">✨</div>
                <div class="tool-info">
                    <div class="tool-name">Генератор 3D</div>
                    <div class="tool-desc">Text‑to‑3D / Image‑to‑3D</div>
                </div>
                <div class="tool-badge">скоро</div>
            </a>
        </div>

        <!-- КАТАЛОГ (заглушка) -->
        <div class="tool-card">
            <a href="#" class="tool-link" onclick="showSoonToast(event)">
                <div class="tool-icon">📚</div>
                <div class="tool-info">
                    <div class="tool-name">Каталог 3D</div>
                    <div class="tool-desc">Cults3D · Бесплатные модели</div>
                </div>
                <div class="tool-badge">скоро</div>
            </a>
        </div>

        <!-- 3D VIEWER (заглушка) -->
        <div class="tool-card">
            <a href="#" class="tool-link" onclick="showSoonToast(event)">
                <div class="tool-icon">📱</div>
                <div class="tool-info">
                    <div class="tool-name">3D Viewer</div>
                    <div class="tool-desc">Просмотр · Конвертация</div>
                </div>
                <div class="tool-badge">скоро</div>
            </a>
        </div>
    </div>

    <footer>
        ⚡ Работает в браузере | 3D Constructor
    </footer>
</div>

<script>
    function showSoonToast(event) {
        event.preventDefault();
        const toast = document.createElement('div');
        toast.textContent = '✨ Этот инструмент появится в следующем обновлении';
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = '#0a0a1fdd';
        toast.style.backdropFilter = 'blur(12px)';
        toast.style.color = 'white';
        toast.style.padding = '10px 24px';
        toast.style.borderRadius = '50px';
        toast.style.fontSize = '0.85rem';
        toast.style.zIndex = '9999';
        toast.style.border = '1px solid #7c3aed';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
</script>

</body>
</html>
