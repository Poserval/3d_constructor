name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm init -y
        npm install @capacitor/android@^5.0.0 @capacitor/core@^5.0.0 @capacitor/filesystem@^5.0.0 @capacitor/network@^5.0.0 @capacitor-community/intent@^5.0.0
        npm install --save-dev @capacitor/cli@^5.0.0 @capacitor/app@^5.0.8 @capacitor/splash-screen@^5.0.8
      
    - name: Build web assets
      run: npm run build
      
    - name: Generate Android project
      run: npx cap add android && npx cap sync android
      
    - name: Replace ALL possible icons
      run: |
        echo "🔄 Заменяем ВСЕ возможные иконки..."
        find android -name "*.png" -type f | while read file; do
          echo "Заменяем: $file"
          cp ./assets/logo_constructor.png "$file" 2>/dev/null || true
        done
        echo "✅ Все иконки заменены!"
      
    - name: Create signing config
      run: |
        echo "🔐 Создаем ключ и конфиг подписи..."
        cd android/app
        keytool -genkeypair -v \
          -keystore release.keystore \
          -alias release \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass "123456" \
          -keypass "123456" \
          -dname "CN=3D Constructor, O=3DConstructor, C=RU"
        
        cat > signing-config.gradle << 'EOF'
        android {
            signingConfigs {
                release {
                    storeFile file("release.keystore")
                    storePassword "123456"
                    keyAlias "release"
                    keyPassword "123456"
                }
            }
            buildTypes {
                release {
                    signingConfig signingConfigs.release
                }
            }
        }
        EOF
        
        echo "apply from: 'signing-config.gradle'" >> build.gradle
        echo "✅ Конфиг подписи создан!"
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: 3d-constructor-release-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 7
