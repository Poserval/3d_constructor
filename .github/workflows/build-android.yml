name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Очистка кэша npm
      - name: Clear npm cache
        run: npm cache clean --force

      # Установка зависимостей
      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core@^7.0.0 @capacitor/android@^7.0.0 @capacitor/filesystem@^7.0.0 @capacitor/network@^7.0.0
          npm install --save-dev @capacitor/cli@^7.0.0

      - name: Build Capacitor Android
        run: |
          npx cap init "3D Constructor" com.constructor3d.app --web-dir=.
          npx cap add android
          npx cap copy
          npx cap sync

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew
        working-directory: ./android

      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: ./android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
